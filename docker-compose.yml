services:

  mysql:
    image: mysql:8
    container_name: knowledge_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: knowledge_saas
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: knowledge_redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build: .
    container_name: knowledge_backend
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DATABASE_URL: mysql://root:root@mysql:3306/knowledge_saas
      JWT_SECRET: supersecret
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  mysql_data: